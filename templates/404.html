{% extends "base.html" %}
{% block title %}404 – Page Not Found{% endblock %}

{% block head %}
<style>
.error-wrap { min-height: calc(100vh - 220px); display:flex; align-items:center; justify-content:center; padding:2rem 0; }
.error-card { text-align:center; max-width:480px; }
.error-code { font-family:'Outfit',sans-serif; font-size:7rem; font-weight:900; line-height:1; background:linear-gradient(135deg,#6c63ff,#30d5c8); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; margin-bottom:.25rem; }
.error-title { font-family:'Outfit',sans-serif; font-size:1.6rem; font-weight:800; color:var(--text-primary)!important; -webkit-text-fill-color:var(--text-primary)!important; background:none!important; margin-bottom:.75rem; }
.error-desc { color:var(--text-muted); font-size:.9rem; line-height:1.65; margin-bottom:2rem; }
.error-actions { display:flex; gap:.75rem; justify-content:center; flex-wrap:wrap; }
.error-blob { font-size:5rem; margin-bottom:1rem; animation:floatBlob 4s ease-in-out infinite; }
@keyframes floatBlob { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-12px); } }
</style>
{% endblock %}

{% block content %}
<div class="error-wrap">
    <div class="error-card">
        <div class="error-blob">🔍</div>
        <div class="error-code">404</div>
        <h1 class="error-title">Page Not Found</h1>
        <p class="error-desc">
            Hmm, this page seems to be lost too! The URL you visited doesn't exist
            or may have been moved.
        </p>
        <div class="error-actions">
            <a href="{{ url_for('home_page') }}" class="btn btn-primary">
                <i class="fas fa-home mr-2"></i> Go Home
            </a>
            <a href="javascript:history.back()" class="btn btn-outline-secondary">
                <i class="fas fa-arrow-left mr-2"></i> Go Back
            </a>
        </div>
    </div>
</div>
{% endblock %}
