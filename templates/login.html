{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block head %}
<style>
.auth-wrapper {
    min-height: calc(100vh - 140px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 0;
}
.auth-card {
    width: 100%;
    max-width: 460px;
    background: rgba(15,25,50,0.82);
    border: 1px solid rgba(108,99,255,0.18);
    border-radius: 24px;
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    box-shadow: 0 24px 64px rgba(0,0,0,0.5), 0 4px 16px rgba(108,99,255,0.1);
    overflow: hidden;
}
.auth-card-header {
    padding: 2.5rem 2.5rem 1.5rem;
    text-align: center;
    border-bottom: 1px solid rgba(255,255,255,0.05);
}
.auth-icon {
    width: 68px;
    height: 68px;
    background: linear-gradient(135deg, rgba(108,99,255,0.25), rgba(48,213,200,0.1));
    border: 1px solid rgba(108,99,255,0.3);
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 1.6rem;
    margin-bottom: 1rem;
    box-shadow: 0 0 24px rgba(108,99,255,0.25);
}
.auth-title {
    font-family: 'Outfit', sans-serif;
    font-size: 1.75rem;
    font-weight: 800;
    color: var(--text-primary) !important;
    background: none !important;
    -webkit-text-fill-color: var(--text-primary) !important;
    margin-bottom: 0.4rem;
}
.auth-subtitle {
    color: var(--text-muted);
    font-size: 0.875rem;
    margin: 0;
}
.auth-body {
    padding: 2rem 2.5rem 2.5rem;
}
.auth-footer-text {
    text-align: center;
    margin-top: 1.5rem;
    color: var(--text-muted);
    font-size: 0.85rem;
}
.auth-footer-text a {
    color: var(--accent-primary);
    font-weight: 600;
}
.divider-text {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin: 1.5rem 0;
    color: var(--text-muted);
    font-size: 0.78rem;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}
.divider-text::before,
.divider-text::after {
    content: '';
    flex: 1;
    height: 1px;
    background: rgba(255,255,255,0.07);
}
</style>
{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-card-header">
            <div class="auth-icon">🔐</div>
            <h2 class="auth-title">Welcome back</h2>
            <p class="auth-subtitle">Sign in to your account to continue</p>
        </div>
        <div class="auth-body">
            <form method="POST" action="{{ url_for('login') }}" id="loginForm">
                <div class="form-group">
                    <label for="email">
                        <i class="fas fa-envelope mr-1" style="color:var(--accent-primary);"></i>
                        Email Address
                    </label>
                    <input type="email" class="form-control" id="email"
                           name="email" placeholder="you@college.edu" required>
                </div>
                <div class="form-group">
                    <div class="d-flex justify-content-between align-items-center mb-1">
                        <label for="password" style="margin-bottom:0;">
                            <i class="fas fa-lock mr-1" style="color:var(--accent-primary);"></i>
                            Password
                        </label>
                        <a href="{{ url_for('forgot_password') }}"
                           style="font-size:0.78rem; color:var(--text-muted); font-weight:500;">
                            Forgot password?
                        </a>
                    </div>
                    <input type="password" class="form-control" id="password"
                           name="password" placeholder="••••••••" required>
                </div>
                <div class="form-group form-check" style="margin-bottom: 1.5rem;">
                    <input type="checkbox" class="form-check-input" id="remember_me" name="remember_me">
                    <label class="form-check-label" for="remember_me">Keep me signed in</label>
                </div>
                <button type="submit" class="btn btn-primary" id="loginBtn">
                    <i class="fas fa-sign-in-alt mr-2"></i> Sign In
                </button>
            </form>

            <div class="divider-text">or</div>

            <div class="auth-footer-text">
                Don't have an account?
                <a href="{{ url_for('register') }}"> Create one free</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
