{% extends "base.html" %}
{% block title %}Report Item{% endblock %}

{% block head %}
<style>
.page-header { display:flex; align-items:center; gap:1rem; margin-bottom:2rem; }
.page-icon { width:52px; height:52px; background:linear-gradient(135deg,rgba(108,99,255,.25),rgba(48,213,200,.1)); border:1px solid rgba(108,99,255,.3); border-radius:14px; display:flex; align-items:center; justify-content:center; font-size:1.4rem; flex-shrink:0; }
.page-header h1 { font-family:'Outfit',sans-serif; font-size:1.8rem; font-weight:800; color:var(--text-primary)!important; background:none!important; -webkit-text-fill-color:var(--text-primary)!important; margin:0; }
.page-header p { color:var(--text-muted); font-size:.85rem; margin:.2rem 0 0; }
.glass-form { background:rgba(15,25,50,.75); border:1px solid rgba(108,99,255,.15); border-radius:24px; backdrop-filter:blur(20px); padding:2.5rem; box-shadow:0 16px 48px rgba(0,0,0,.4); }
.form-section-label { font-size:.7rem; font-weight:700; color:var(--accent-primary); text-transform:uppercase; letter-spacing:1px; margin-bottom:1.2rem; padding-bottom:.5rem; border-bottom:1px solid rgba(108,99,255,.15); }
.form-row-2 { display:grid; grid-template-columns:1fr 1fr; gap:0 1.25rem; }
.status-toggle { display:flex; gap:.75rem; }
.status-toggle input[type="radio"] { display:none; }
.status-toggle label { flex:1; text-align:center; padding:.75rem; border:1px solid rgba(255,255,255,.1); border-radius:10px; cursor:pointer; transition:all .25s; font-size:.875rem; font-weight:600; text-transform:none; letter-spacing:normal; color:var(--text-secondary); background:rgba(255,255,255,.03); }
.status-toggle input[value="LOST"]:checked + label { background:rgba(255,95,109,.15); border-color:rgba(255,95,109,.4); color:#ff8a93; }
.status-toggle input[value="FOUND"]:checked + label { background:rgba(48,213,200,.15); border-color:rgba(48,213,200,.4); color:var(--accent-teal); }
.file-upload-zone { border:2px dashed rgba(108,99,255,.35); border-radius:14px; padding:2rem; text-align:center; background:rgba(108,99,255,.04); cursor:pointer; transition:all .25s; position:relative; }
.file-upload-zone:hover { border-color:var(--accent-primary); background:rgba(108,99,255,.08); }
.file-upload-zone input[type="file"] { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; border:none!important; background:none!important; padding:0!important; }
.file-upload-zone .upload-icon { font-size:2rem; margin-bottom:.5rem; }
.file-upload-zone .upload-text { color:var(--text-secondary); font-size:.875rem; font-weight:500; }
.file-upload-zone .upload-hint { color:var(--text-muted); font-size:.75rem; margin-top:.3rem; }
</style>
{% endblock %}

{% block content %}
<div class="page-header">
    <div class="page-icon">📦</div>
    <div>
        <h1>Report an Item</h1>
        <p>Help us reunite lost belongings with their owners</p>
    </div>
</div>

<div class="glass-form">
    <form method="POST" action="{{ url_for('add_item') }}" enctype="multipart/form-data" id="addItemForm">

        <div class="form-section-label"><i class="fas fa-info-circle mr-1"></i> Item Information</div>

        <div class="form-group">
            <label for="name"><i class="fas fa-box mr-1" style="color:var(--accent-primary);"></i> Item Name</label>
            <input type="text" class="form-control" id="name" name="name" placeholder="e.g. Blue Water Bottle" required>
        </div>

        <div class="form-group">
            <label for="description"><i class="fas fa-align-left mr-1" style="color:var(--accent-primary);"></i> Description</label>
            <textarea class="form-control" id="description" name="description" rows="3" placeholder="Describe the item — color, brand, any identifying marks…" required></textarea>
        </div>

        <div class="form-row-2">
            <div class="form-group">
                <label for="category"><i class="fas fa-tag mr-1" style="color:var(--accent-primary);"></i> Category</label>
                <select class="form-control" id="category" name="category" required>
                    <option value="" disabled selected>Choose category</option>
                    {% for category in categories %}
                    <option value="{{ category.id }}">{{ category.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label for="date_lost_or_found"><i class="fas fa-calendar mr-1" style="color:var(--accent-primary);"></i> Date Lost / Found</label>
                <input type="date" class="form-control" id="date_lost_or_found" name="date" required>
            </div>
        </div>

        <div class="form-group">
            <label for="location"><i class="fas fa-map-marker-alt mr-1" style="color:var(--accent-primary);"></i> Location</label>
            <input type="text" class="form-control" id="location" name="location" placeholder="e.g. Library Ground Floor, Cafeteria…" required>
        </div>

        <div class="form-section-label mt-3"><i class="fas fa-toggle-on mr-1"></i> Item Status</div>
        <div class="form-group">
            <div class="status-toggle">
                <input type="radio" id="status_lost" name="status" value="LOST" checked>
                <label for="status_lost"><i class="fas fa-exclamation-triangle mr-1"></i> Lost</label>
                <input type="radio" id="status_found" name="status" value="FOUND">
                <label for="status_found"><i class="fas fa-check-circle mr-1"></i> Found</label>
            </div>
        </div>

        <div class="form-section-label mt-3"><i class="fas fa-image mr-1"></i> Photo</div>
        <div class="form-group">
            <div class="file-upload-zone">
                <input type="file" id="image" name="image" accept="image/*" onchange="updateFileName(this)">
                <div class="upload-icon">📷</div>
                <div class="upload-text" id="uploadLabel">Click to upload or drag &amp; drop</div>
                <div class="upload-hint">PNG, JPG, WEBP — max 5 MB</div>
            </div>
        </div>

        <button type="submit" class="btn btn-primary mt-2">
            <i class="fas fa-paper-plane mr-2"></i> Submit Report
        </button>
    </form>
</div>

<script>
function updateFileName(input) {
    const label = document.getElementById('uploadLabel');
    if (input.files && input.files[0]) {
        label.textContent = '✅ ' + input.files[0].name;
    }
}
</script>
{% endblock %}
