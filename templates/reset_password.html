{% extends "base.html" %}
{% block title %}Reset Password{% endblock %}

{% block head %}
<style>
.auth-wrapper { min-height:calc(100vh - 140px); display:flex; align-items:center; justify-content:center; padding:2rem 0; }
.auth-card { width:100%; max-width:460px; background:rgba(15,25,50,.82); border:1px solid rgba(108,99,255,.18); border-radius:24px; backdrop-filter:blur(24px); -webkit-backdrop-filter:blur(24px); box-shadow:0 24px 64px rgba(0,0,0,.5),0 4px 16px rgba(108,99,255,.1); overflow:hidden; }
.auth-card-header { padding:2.5rem 2.5rem 1.5rem; text-align:center; border-bottom:1px solid rgba(255,255,255,.05); }
.auth-icon { width:68px; height:68px; background:linear-gradient(135deg,rgba(108,99,255,.25),rgba(48,213,200,.1)); border:1px solid rgba(108,99,255,.3); border-radius:50%; display:inline-flex; align-items:center; justify-content:center; font-size:1.6rem; margin-bottom:1rem; box-shadow:0 0 24px rgba(108,99,255,.25); }
.auth-title { font-family:'Outfit',sans-serif; font-size:1.75rem; font-weight:800; color:var(--text-primary)!important; background:none!important; -webkit-text-fill-color:var(--text-primary)!important; margin-bottom:.4rem; }
.auth-subtitle { color:var(--text-muted); font-size:.875rem; margin:0; }
.auth-body { padding:2rem 2.5rem 2.5rem; }
.strength-bar { height:4px; border-radius:2px; background:rgba(255,255,255,.08); margin-top:.5rem; overflow:hidden; }
.strength-fill { height:100%; border-radius:2px; width:0; transition:width .3s, background .3s; }
</style>
{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-card-header">
            <div class="auth-icon">🔒</div>
            <h2 class="auth-title">New Password</h2>
            <p class="auth-subtitle">Create a strong password for your account</p>
        </div>
        <div class="auth-body">
            <form method="POST" action="{{ url_for('reset_password', user_id=user_id) }}"
                  onsubmit="return validatePassword()" id="resetForm">
                <div class="form-group" style="margin-bottom:1.5rem;">
                    <label for="new_password">
                        <i class="fas fa-lock mr-1" style="color:var(--accent-primary);"></i>
                        New Password
                    </label>
                    <input type="password" class="form-control" id="new_password"
                           name="password" placeholder="Min 8 chars, letters &amp; numbers"
                           oninput="checkStrength(this.value)" required>
                    <div class="strength-bar">
                        <div class="strength-fill" id="strengthFill"></div>
                    </div>
                    <small id="strengthLabel" style="margin-top:.4rem;">
                        Must be at least 8 characters with letters and numbers
                    </small>
                </div>
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-check-circle mr-2"></i> Set New Password
                </button>
            </form>
        </div>
    </div>
</div>

<script>
function checkStrength(val) {
    const fill = document.getElementById('strengthFill');
    const label = document.getElementById('strengthLabel');
    let score = 0;
    if (val.length >= 8) score++;
    if (/[A-Za-z]/.test(val) && /\d/.test(val)) score++;
    if (val.length >= 12) score++;
    const colors = ['#ff5f6d','#f0c060','#30d5c8'];
    const labels = ['Too short','Fair — add numbers','Strong password ✓'];
    fill.style.width = (score / 3 * 100) + '%';
    fill.style.background = colors[score - 1] || '#ff5f6d';
    label.textContent = labels[score - 1] || 'Must be at least 8 characters with letters and numbers';
    label.style.color = score === 3 ? '#30d5c8' : 'var(--text-muted)';
}
function validatePassword() {
    const password = document.getElementById("new_password").value;
    if (!/^(?=.*[A-Za-z])(?=.*\d)[A-Za-z\d]{8,}$/.test(password)) {
        alert("Password must be at least 8 characters long and contain both letters and numbers.");
        return false;
    }
    return true;
}
</script>
{% endblock %}
